<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ film.nomi }} | Kinotop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s;
        }
        .loading.hide { opacity: 0; pointer-events: none; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s;
        }
        .error-msg.show { transform: translateY(0); }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:white">🎬 Film yuklanmoqda...</div>
</div>

<div class="video-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        {% if film.platform == 'direct' %}
            <video id="videoPlayer" src="{{ film.embed_url }}" controls autoplay style="width:100%;height:100%"></video>
        {% elif film.platform == 'googledrive' %}
            <iframe id="videoPlayer" src="{{ film.embed_url }}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
        {% else %}
            <iframe id="videoPlayer" src="{{ film.embed_url }}" allow="autoplay; fullscreen" allowfullscreen></iframe>
        {% endif %}
    </div>
</div>

<div class="error-msg" id="errorMsg">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    (function() {
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        
        function showError(text) {
            errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + text;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 4000);
        }
        
        // Yuklashni yashirish
        setTimeout(() => {
            loading.classList.add('hide');
        }, 1500);
        
        // Orqaga qaytish
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = '/';
        });
        
        // Video player xatoliklari
        const videoPlayer = document.getElementById('videoPlayer');
        if (videoPlayer && videoPlayer.tagName === 'VIDEO') {
            videoPlayer.onerror = function() {
                showError('Video yuklanmadi. URL manzilni tekshiring.');
            };
        }
        
        // Iframe xatoliklari (cheklangan)
        if (videoPlayer && videoPlayer.tagName === 'IFRAME') {
            setTimeout(() => {
                loading.classList.add('hide');
            }, 1000);
        }
    })();
</script>
</body>

    <div class="loading-text">🎬 Film yuklanmoqda...</div>

<div class="film-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        <video id="nativeVideo" style="display: none; width: 100%; height: 100%;"></video>
        <iframe id="videoIframe" style="display: none; width: 100%; height: 100%;" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                allowfullscreen="true"></iframe>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    (function() {
        // ============ GLOBAL VARIABLES ============
        const filmData = {{ film | tojson | safe }};
        let currentPlayer = null; // 'native', 'youtube', or 'embed'
        let videoElement = null;
        let isPlaying = false;
        let controlsTimer = null;
        let backTimer = null;
        let progressInterval = null;
        
        // ============ HELPER FUNCTIONS ============
        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 4000);
        }

        function isDriveUrl(url) {
            return url && (url.includes('drive.google.com') || url.includes('drive.usercontent.google.com'));
        }

        function isYoutubeUrl(url) {
            if (!url) return false;
            return url.includes('youtube.com') || url.includes('youtu.be');
        }

        function isEmbedUrl(url) {
            if (!url) return false;
            return url.includes('/embed.html') || url.includes('iframe');
        }

        function getDirectVideoUrl(url) {
            if (!url) return null;
            // Google Drive direct link konvertatsiyasi
            if (url.includes('drive.google.com/file/d/')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match) {
                    return `https://drive.google.com/uc?export=download&id=${match[1]}`;
                }
            }
            // UZMedia embed orqali to'g'ridan-to'g'ri mp4
            if (url.includes('embed.html?file=')) {
                const fileUrl = url.split('embed.html?file=')[1];
                return decodeURIComponent(fileUrl);
            }
            // Agar to'g'ridan-to'g'ri mp4 bo'lsa
            if (url.match(/\.(mp4|m3u8|webm|ogg)$/i)) {
                return url;
            }
            return null;
        }

        // ============ NATIVE VIDEO PLAYER (MP4) ============
        function initNativePlayer(videoSrc) {
            return new Promise((resolve, reject) => {
                const video = document.getElementById('nativeVideo');
                const wrapper = document.getElementById('videoWrapper');
                video.style.display = 'block';
                document.getElementById('videoIframe').style.display = 'none';
                
                video.src = videoSrc;
                video.crossOrigin = "anonymous";
                
                video.addEventListener('loadedmetadata', () => {
                    videoElement = video;
                    resolve(video);
                });
                
                video.addEventListener('error', (e) => {
                    console.error('Video yuklash xatosi:', e);
                    reject(new Error('Video yuklanmadi'));
                });
                
                video.load();
            });
        }

        // ============ IFRAME EMBED PLAYER ============
        function initEmbedPlayer(embedUrl) {
            return new Promise((resolve, reject) => {
                const iframe = document.getElementById('videoIframe');
                iframe.style.display = 'block';
                document.getElementById('nativeVideo').style.display = 'none';
                iframe.src = embedUrl;
                
                iframe.onload = () => {
                    resolve(iframe);
                };
                
                iframe.onerror = () => {
                    reject(new Error('Embed yuklanmadi'));
                };
            });
        }

        // ============ YOUTUBE PLAYER ============
        let ytPlayer = null;
        function initYoutubePlayer(videoId) {
            return new Promise((resolve, reject) => {
                const iframe = document.getElementById('videoIframe');
                iframe.style.display = 'block';
                document.getElementById('nativeVideo').style.display = 'none';
                
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1`;
                
                if (window.YT && YT.Player) {
                    ytPlayer = new YT.Player(iframe, {
                        events: {
                            'onReady': () => resolve(ytPlayer),
                            'onError': () => reject(new Error('YouTube xatosi'))
                        }
                    });
                } else {
                    window.onYouTubeIframeAPIReady = () => {
                        ytPlayer = new YT.Player(iframe, {
                            events: {
                                'onReady': () => resolve(ytPlayer),
                                'onError': () => reject(new Error('YouTube xatosi'))
                            }
                        });
                    };
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    document.head.appendChild(tag);
                }
            });
        }

        // ============ PLAYER CONTROLS ============
        function showControls() {
            const controls = document.getElementById('controlsOverlay');
            const filmInfo = document.getElementById('filmInfo');
            controls.classList.add('show');
            filmInfo.classList.add('show');
            
            if (controlsTimer) clearTimeout(controlsTimer);
            controlsTimer = setTimeout(() => {
                controls.classList.remove('show');
                filmInfo.classList.remove('show');
            }, 2000);
        }
        
        function showBackButton() {
            const backBtn = document.getElementById('backBtn');
            backBtn.classList.remove('hide');
            if (backTimer) clearTimeout(backTimer);
            backTimer = setTimeout(() => {
                backBtn.classList.add('hide');
            }, 2000);
        }

        function togglePlayPause() {
            if (currentPlayer === 'native' && videoElement) {
                if (videoElement.paused) {
                    videoElement.play();
                    document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                } else {
                    videoElement.pause();
                    document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                }
            } else if (currentPlayer === 'youtube' && ytPlayer) {
                if (isPlaying) {
                    ytPlayer.pauseVideo();
                    document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                } else {
                    ytPlayer.playVideo();
                    document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                }
            } else if (currentPlayer === 'embed') {
                // Embed playerda play/pause ishlamaydi, lekin try qilamiz
                try {
                    const iframe = document.getElementById('videoIframe');
                    iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                } catch(e) {}
            }
            showControls();
        }
        
        function seek(seconds) {
            if (currentPlayer === 'native' && videoElement) {
                videoElement.currentTime += seconds;
            } else if (currentPlayer === 'youtube' && ytPlayer) {
                ytPlayer.seekTo(ytPlayer.getCurrentTime() + seconds, true);
            }
            showControls();
        }
        
        function seekToPercent(percent) {
            if (currentPlayer === 'native' && videoElement && videoElement.duration) {
                videoElement.currentTime = videoElement.duration * percent;
            } else if (currentPlayer === 'youtube' && ytPlayer && ytPlayer.getDuration) {
                ytPlayer.seekTo(ytPlayer.getDuration() * percent, true);
            }
            showControls();
        }
        
        function updateProgress() {
            if (currentPlayer === 'native' && videoElement && videoElement.duration) {
                const percent = (videoElement.currentTime / videoElement.duration) * 100;
                document.getElementById('progressFilled').style.width = percent + '%';
                document.getElementById('currentTime').innerText = formatTime(videoElement.currentTime);
                document.getElementById('duration').innerText = formatTime(videoElement.duration);
                
                // Bufferni hisoblash
                if (videoElement.buffered.length > 0) {
                    const bufferedEnd = videoElement.buffered.end(videoElement.buffered.length - 1);
                    const bufferedPercent = (bufferedEnd / videoElement.duration) * 100;
                    document.getElementById('progressBuffered').style.width = bufferedPercent + '%';
                }
            } else if (currentPlayer === 'youtube' && ytPlayer && ytPlayer.getCurrentTime) {
                const current = ytPlayer.getCurrentTime();
                const duration = ytPlayer.getDuration();
                if (duration) {
                    const percent = (current / duration) * 100;
                    document.getElementById('progressFilled').style.width = percent + '%';
                    document.getElementById('currentTime').innerText = formatTime(current);
                    document.getElementById('duration').innerText = formatTime(duration);
                }
                if (ytPlayer.getVideoLoadedFraction) {
                    const buffered = ytPlayer.getVideoLoadedFraction() * 100;
                    document.getElementById('progressBuffered').style.width = buffered + '%';
                }
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            return `${m}:${s.toString().padStart(2,'0')}`;
        }

        // ============ TOGGLE FULLSCREEN ============
        function toggleFullScreen() {
            const container = document.getElementById('film-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
                document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                document.exitFullscreen();
                document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-expand"></i>';
            }
            showControls();
        }

        // ============ MAIN ============
        async function init() {
            const loadingDiv = document.getElementById('filmLoading');
            
            try {
                // Film ma'lumotlarini ekranga chiqarish
                document.getElementById('filmTitle').innerText = filmData.sarlavha || filmData.nomi || 'Film';
                document.getElementById('filmDesc').innerText = filmData.tafsilot || '';
                
                let videoUrl = filmData.video_url || filmData.embed_url || '';
                if (!videoUrl) {
                    throw new Error('Video URL topilmadi');
                }
                
                // Qaysi turdagi player ishlatilishini aniqlash
                if (isYoutubeUrl(videoUrl)) {
                    // YouTube player
                    const videoId = extractYoutubeId(videoUrl);
                    if (!videoId) throw new Error('YouTube ID topilmadi');
                    currentPlayer = 'youtube';
                    await initYoutubePlayer(videoId);
                } 
                else if (isEmbedUrl(videoUrl)) {
                    // Embed player
                    currentPlayer = 'embed';
                    await initEmbedPlayer(videoUrl);
                }
                else {
                    // MP4 yoki to'g'ridan-to'g'ri havola
                    const directUrl = getDirectVideoUrl(videoUrl);
                    if (!directUrl) throw new Error('Video manzili topilmadi');
                    currentPlayer = 'native';
                    videoElement = await initNativePlayer(directUrl);
                    // Native videoni autoplay qilish uchun
                    await videoElement.play();
                    isPlaying = true;
                    document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                }
                
                // Progress updater
                if (progressInterval) clearInterval(progressInterval);
                progressInterval = setInterval(updateProgress, 500);
                
                // Event listeners
                setupEventListeners();
                
            } catch (error) {
                console.error('Xatolik:', error);
                showError('Videoni yuklashda xatolik: ' + error.message);
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
            } finally {
                loadingDiv.classList.add('hide');
            }
        }

        function extractYoutubeId(url) {
            const patterns = [
                /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
                /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
                /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
                /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (let p of patterns) {
                const match = url.match(p);
                if (match) return match[1];
            }
            return null;
        }

        function setupEventListeners() {
            const wrapper = document.getElementById('videoWrapper');
            const backBtn = document.getElementById('backBtn');
            
            wrapper.addEventListener('mousemove', () => { showControls(); showBackButton(); });
            wrapper.addEventListener('click', () => { showControls(); showBackButton(); });
            wrapper.addEventListener('touchstart', () => { showControls(); showBackButton(); });
            wrapper.addEventListener('dblclick', () => toggleFullScreen());
            
            backBtn.addEventListener('click', () => {
                if (progressInterval) clearInterval(progressInterval);
                window.location.href = '/';
            });
            
            document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
            document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
            document.getElementById('rewindBtn').addEventListener('click', () => seek(-10));
            document.getElementById('forwardBtn').addEventListener('click', () => seek(10));
            document.getElementById('progressBar').addEventListener('click', (e) => {
                const rect = document.getElementById('progressBar').getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                seekToPercent(pos);
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space' || e.key === 'k' || e.key === 'K') {
                    e.preventDefault();
                    togglePlayPause();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    seek(-10);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    seek(10);
                } else if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    toggleFullScreen();
                }
                showControls();
                showBackButton();
            });
        }

        // Start
        init();
    })();
</script>
</body>
</html>
