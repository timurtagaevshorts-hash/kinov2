<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-wrapper iframe, .video-wrapper video {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: contain;
        }
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s;
        }
        .loading.hide { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; font-size: 0.9rem; }
        .error-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            padding: 14px;
            border-radius: 12px;
            color: white;
            text-align: center;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s;
        }
        .error-msg.show { transform: translateY(0); }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="video-container">
    <div class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></div>
    <div class="fullscreen-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></div>
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="videoPlayer" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
</div>

<div class="error-msg" id="errorMsg">⚠️ Video yuklashda xatolik</div>

<script>
    (function() {
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const backBtn = document.getElementById('backBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoPlayer = document.getElementById('videoPlayer');
        
        const kod = window.location.pathname.split('/').pop();
        
        function showError(text) {
            errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + text;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 4000);
        }
        
        // Tomosha qilish URL ini olish
        fetch(`/api/watch/${kod}`)
            .then(res => res.json())
            .then(data => {
                if (data.exists && data.watch_url) {
                    videoPlayer.src = data.watch_url;
                    setTimeout(() => loading.classList.add('hide'), 1000);
                } else {
                    showError('Video topilmadi!');
                    setTimeout(() => window.location.href = '/', 2000);
                }
            })
            .catch(() => {
                showError('Video yuklashda xatolik!');
                setTimeout(() => window.location.href = '/', 2000);
            });
        
        backBtn.addEventListener('click', () => window.location.href = '/');
        
        function toggleFullScreen() {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }
        
        fullscreenBtn.addEventListener('click', toggleFullScreen);
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        });
    })();
</script>
</body>
</html>
