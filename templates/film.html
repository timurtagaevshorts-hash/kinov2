<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        /* Full screen mode */
        body:fullscreen {
            overflow: hidden !important;
        }
        body:-webkit-full-screen {
            overflow: hidden !important;
        }
        body:-moz-full-screen {
            overflow: hidden !important;
        }

        /* Film Container */
        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* Video Player */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Full screen mode styles */
        .video-wrapper iframe:-webkit-full-screen {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }
        .video-wrapper iframe:fullscreen {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }

        /* Controls Overlay */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper:active .controls-overlay {
            opacity: 1;
        }

        .controls-overlay.show {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn:hover {
            background: rgba(102,126,234,0.8);
            transform: scale(1.05);
        }

        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Progress Bar */
        .progress-container {
            padding: 0 10px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            position: relative;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        /* Film Info */
        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .film-info,
        .video-wrapper:active .film-info {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            line-height: 1.4;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .back-btn:hover {
            background: rgba(102,126,234,0.8);
        }

        /* Loading */
        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Quality Selector */
        .quality-selector {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 15;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: none;
            pointer-events: auto;
        }

        .quality-selector.show {
            display: flex;
            gap: 5px;
        }

        .quality-btn {
            background: transparent;
            border: none;
            padding: 8px 12px;
            color: white;
            font-size: 0.7rem;
            border-radius: 20px;
            cursor: pointer;
        }

        .quality-btn.active {
            background: #667eea;
        }

        /* Error Message */
        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .play-pause-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            .film-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="film-container" id="filmContainer">
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="videoIframe" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                allowfullscreen="true"
                webkitallowfullscreen="true"
                mozallowfullscreen="true">
        </iframe>
        
        <!-- Controls -->
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <!-- Film Info -->
        <div class="film-info" id="filmInfo">
            <div class="film-title" id="filmTitle">Loading...</div>
            <div class="film-desc" id="filmDesc"></div>
        </div>
        
        <!-- Quality Selector -->
        <div class="quality-selector" id="qualitySelector">
            <!-- Quality options will be added dynamically -->
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik yuz berdi
</div>

<script>
    // ============ GET FILM DATA FROM SERVER ============
    const filmCode = window.location.pathname.split('/').pop();
    let filmData = null;
    let currentIframe = null;
    let isPlaying = false;
    let controlsTimeout = null;
    let isFullScreen = false;
    
    // ============ FULL SCREEN FUNCTIONS ============
    function toggleFullScreen() {
        const videoWrapper = document.getElementById('videoWrapper');
        const iframe = document.getElementById('videoIframe');
        
        if (!isFullScreen) {
            // Enter full screen
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            } else if (videoWrapper.requestFullscreen) {
                videoWrapper.requestFullscreen();
            } else {
                // Fallback - try with body
                document.body.requestFullscreen();
            }
            document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-compress"></i>';
            isFullScreen = true;
        } else {
            // Exit full screen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-expand"></i>';
            isFullScreen = false;
        }
    }
    
    // Listen for full screen change
    document.addEventListener('fullscreenchange', updateFullScreenStatus);
    document.addEventListener('webkitfullscreenchange', updateFullScreenStatus);
    document.addEventListener('mozfullscreenchange', updateFullScreenStatus);
    
    function updateFullScreenStatus() {
        isFullScreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        if (fullscreenBtn) {
            if (isFullScreen) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }
    }
    
    // ============ VIDEO CONTROLS ============
    function showControls() {
        const controls = document.getElementById('controlsOverlay');
        const filmInfo = document.getElementById('filmInfo');
        controls.classList.add('show');
        filmInfo.classList.add('show');
        
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            controls.classList.remove('show');
            filmInfo.classList.remove('show');
        }, 3000);
    }
    
    // Toggle play/pause
    function togglePlayPause() {
        if (currentIframe && currentIframe.contentWindow) {
            if (isPlaying) {
                currentIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            } else {
                currentIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            }
        }
    }
    
    // Seek forward/backward
    function seek(seconds) {
        if (currentIframe && currentIframe.contentWindow) {
            currentIframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'seekTo',
                args: [seconds, true]
            }), '*');
        }
    }
    
    // ============ FETCH FILM DATA ============
    async function loadFilm() {
        const loading = document.getElementById('filmLoading');
        const errorMsg = document.getElementById('errorMessage');
        
        try {
            const response = await fetch(`/api/film/${filmCode}`);
            const data = await response.json();
            
            if (data.exists && data.film) {
                filmData = data.film;
                displayFilm();
            } else {
                throw new Error('Film not found');
            }
        } catch (error) {
            console.error('Error loading film:', error);
            loading.classList.add('hide');
            showError('Film topilmadi!');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    }
    
    function displayFilm() {
        const loading = document.getElementById('filmLoading');
        const iframe = document.getElementById('videoIframe');
        const title = document.getElementById('filmTitle');
        const desc = document.getElementById('filmDesc');
        
        // Set film info
        title.textContent = filmData.sarlavha || filmData.nomi || 'Film';
        desc.textContent = filmData.tafsilot || filmData.description || '';
        
        // Build video URL
        let videoUrl = filmData.video_url || filmData.embed_url;
        
        // Add autoplay and other parameters
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
            // YouTube video
            let videoId = '';
            if (videoUrl.includes('youtu.be/')) {
                videoId = videoUrl.split('youtu.be/')[1].split('?')[0];
            } else if (videoUrl.includes('watch?v=')) {
                videoId = videoUrl.split('watch?v=')[1].split('&')[0];
            } else if (videoUrl.includes('embed/')) {
                videoId = videoUrl.split('embed/')[1].split('?')[0];
            }
            
            videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1`;
        } else if (videoUrl.includes('vimeo.com')) {
            // Vimeo video
            let videoId = videoUrl.split('vimeo.com/')[1].split('?')[0];
            videoUrl = `https://player.vimeo.com/video/${videoId}?autoplay=1&controls=0&playsinline=1`;
        }
        
        // Set iframe src
        iframe.src = videoUrl;
        currentIframe = iframe;
        
        // Hide loading after video loads
        iframe.onload = () => {
            setTimeout(() => {
                loading.classList.add('hide');
                isPlaying = true;
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
            }, 500);
        };
        
        // Error handling
        iframe.onerror = () => {
            loading.classList.add('hide');
            showError('Video yuklanmadi!');
        };
        
        // Show controls on activity
        const wrapper = document.getElementById('videoWrapper');
        wrapper.addEventListener('mousemove', showControls);
        wrapper.addEventListener('click', showControls);
        wrapper.addEventListener('touchstart', showControls);
        
        // Double click for full screen
        wrapper.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleFullScreen();
        });
        
        // Hide loading after timeout
        setTimeout(() => {
            loading.classList.add('hide');
        }, 5000);
    }
    
    function showError(message) {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.textContent = message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 3000);
    }
    
    // ============ KEYBOARD CONTROLS ============
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Space':
                e.preventDefault();
                togglePlayPause();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                seek(-10);
                break;
            case 'ArrowRight':
                e.preventDefault();
                seek(10);
                break;
            case 'f':
            case 'F':
                e.preventDefault();
                toggleFullScreen();
                break;
            case 'Escape':
                if (isFullScreen) {
                    toggleFullScreen();
                }
                break;
        }
        showControls();
    });
    
    // ============ TELEGRAM WEB FIX ============
    function isTelegramWeb() {
        return /Telegram/.test(navigator.userAgent) || 
               /TelegramWeb/.test(navigator.userAgent) ||
               window.location.hostname.includes('telegram.org');
    }
    
    if (isTelegramWeb()) {
        // Add Telegram specific fixes
        const style = document.createElement('style');
        style.textContent = `
            .video-wrapper iframe {
                pointer-events: auto !important;
            }
            .control-btn {
                background: rgba(0,0,0,0.7) !important;
            }
        `;
        document.head.appendChild(style);
        
        // Show instruction for Telegram users
        setTimeout(() => {
            const instruction = document.createElement('div');
            instruction.style.position = 'fixed';
            instruction.style.bottom = '100px';
            instruction.style.left = '20px';
            instruction.style.right = '20px';
            instruction.style.background = 'rgba(0,0,0,0.8)';
            instruction.style.backdropFilter = 'blur(10px)';
            instruction.style.padding = '12px';
            instruction.style.borderRadius = '12px';
            instruction.style.color = 'white';
            instruction.style.fontSize = '0.75rem';
            instruction.style.textAlign = 'center';
            instruction.style.zIndex = '1000';
            instruction.innerHTML = '⛶ Full screen uchun ikki marta bosing yoki F tugmasini bosing';
            document.body.appendChild(instruction);
            
            setTimeout(() => {
                instruction.style.opacity = '0';
                setTimeout(() => instruction.remove(), 500);
            }, 4000);
        }, 1000);
    }
    
    // ============ LISTEN FOR YOUTUBE PLAYER EVENTS ============
    window.addEventListener('message', (event) => {
        if (event.data === 'requestFullScreen') {
            toggleFullScreen();
        }
    });
    
    // Update time display (YouTube)
    function updateTimeInfo() {
        if (currentIframe && currentIframe.contentWindow) {
            // Request current time from YouTube player
            currentIframe.contentWindow.postMessage('{"event":"command","func":"getCurrentTime","args":""}', '*');
            currentIframe.contentWindow.postMessage('{"event":"command","func":"getDuration","args":""}', '*');
        }
    }
    
    // Format time
    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // Update progress bar
    function updateProgress(current, duration) {
        const progress = (current / duration) * 100;
        document.getElementById('progressFilled').style.width = `${progress}%`;
        document.getElementById('currentTime').textContent = formatTime(current);
        document.getElementById('duration').textContent = formatTime(duration);
    }
    
    // Progress bar click
    const progressBar = document.getElementById('progressBar');
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        const duration = 100; // Get actual duration from video
        const seekTime = pos * duration;
        seek(seekTime);
    });
    
    // ============ INITIALIZE ============
    document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
    document.getElementById('rewindBtn').addEventListener('click', () => seek(-10));
    document.getElementById('forwardBtn').addEventListener('click', () => seek(10));
    
    // Start loading film
    loadFilm();
    
    // Update time periodically
    setInterval(updateTimeInfo, 1000);
</script>
</body>
</html>
