<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        /* Full screen mode */
        body:fullscreen {
            overflow: hidden !important;
            width: 100% !important;
            height: 100% !important;
        }
        body:-webkit-full-screen {
            overflow: hidden !important;
        }
        body:-moz-full-screen {
            overflow: hidden !important;
        }

        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: contain;
        }

        /* Full screen da iframe to'liq ekran */
        .video-wrapper:fullscreen iframe,
        .video-wrapper:-webkit-full-screen iframe,
        .video-wrapper:-moz-full-screen iframe {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper:active .controls-overlay,
        .controls-overlay.show {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active { transform: scale(0.95); }
        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .progress-container {
            padding: 0 10px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .film-info,
        .film-info.show {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .control-btn { width: 40px; height: 40px; font-size: 1rem; }
            .play-pause-btn { width: 50px; height: 50px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="film-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="videoIframe" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                allowfullscreen="true"
                webkitallowfullscreen="true"
                mozallowfullscreen="true">
        </iframe>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <div class="film-info" id="filmInfo">
            <div class="film-title" id="filmTitle">Loading...</div>
            <div class="film-desc" id="filmDesc"></div>
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    // ============ FILM KODINI OLISH ============
    const filmCode = window.location.pathname.split('/').pop();
    let currentVideoUrl = '';
    let isPlaying = false;
    let controlsTimeout = null;
    let isFullScreen = false;
    let currentIframe = null;
    
    // ============ FULL SCREEN FUNCTIONS (Browser + Telegram) ============
    function toggleFullScreen() {
        const wrapper = document.getElementById('videoWrapper');
        const iframe = document.getElementById('videoIframe');
        
        if (!isFullScreen) {
            // Enter full screen
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            } else if (wrapper.msRequestFullscreen) {
                wrapper.msRequestFullscreen();
            } else if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-compress"></i>';
            isFullScreen = true;
        } else {
            // Exit full screen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-expand"></i>';
            isFullScreen = false;
        }
    }
    
    // Full screen change event listener
    function handleFullScreenChange() {
        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
        const btn = document.getElementById('fullscreenBtn');
        if (btn) {
            if (isFs) {
                btn.innerHTML = '<i class="fas fa-compress"></i>';
                isFullScreen = true;
            } else {
                btn.innerHTML = '<i class="fas fa-expand"></i>';
                isFullScreen = false;
            }
        }
    }
    
    document.addEventListener('fullscreenchange', handleFullScreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullScreenChange);
    document.addEventListener('mozfullscreenchange', handleFullScreenChange);
    
    // ============ VIDEO CONTROLS ============
    function showControls() {
        const controls = document.getElementById('controlsOverlay');
        const filmInfo = document.getElementById('filmInfo');
        controls.classList.add('show');
        filmInfo.classList.add('show');
        
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            controls.classList.remove('show');
            filmInfo.classList.remove('show');
        }, 3000);
    }
    
    function togglePlayPause() {
        const iframe = document.getElementById('videoIframe');
        if (iframe && iframe.contentWindow) {
            if (isPlaying) {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            } else {
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            }
        }
    }
    
    function seek(seconds) {
        const iframe = document.getElementById('videoIframe');
        if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'seekTo',
                args: [seconds, true]
            }), '*');
        }
    }
    
    // ============ FILM MA'LUMOTLARI ============
    const filmFromServer = {{ film | tojson | safe }};
    
    function displayFilm() {
        const loading = document.getElementById('filmLoading');
        const iframe = document.getElementById('videoIframe');
        const title = document.getElementById('filmTitle');
        const desc = document.getElementById('filmDesc');
        
        if (!filmFromServer || !filmFromServer.id) {
            loading.classList.add('hide');
            showError('Film ma\'lumotlari topilmadi!');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
            return;
        }
        
        title.textContent = filmFromServer.sarlavha || filmFromServer.nomi || 'Film';
        desc.textContent = filmFromServer.tafsilot || filmFromServer.description || '';
        
        let videoUrl = filmFromServer.video_url || filmFromServer.embed_url;
        
        if (!videoUrl) {
            loading.classList.add('hide');
            showError('Video URL topilmadi!');
            return;
        }
        
        // YouTube video
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
            let videoId = '';
            if (videoUrl.includes('youtu.be/')) {
                videoId = videoUrl.split('youtu.be/')[1].split('?')[0];
            } else if (videoUrl.includes('watch?v=')) {
                videoId = videoUrl.split('watch?v=')[1].split('&')[0];
            } else if (videoUrl.includes('embed/')) {
                videoId = videoUrl.split('embed/')[1].split('?')[0];
            }
            
            if (videoId) {
                videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1`;
            }
        }
        
        iframe.src = videoUrl;
        currentIframe = iframe;
        
        iframe.onload = () => {
            setTimeout(() => {
                loading.classList.add('hide');
                isPlaying = true;
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
            }, 500);
        };
        
        iframe.onerror = () => {
            loading.classList.add('hide');
            showError('Video yuklanmadi!');
        };
        
        const wrapper = document.getElementById('videoWrapper');
        wrapper.addEventListener('mousemove', showControls);
        wrapper.addEventListener('click', showControls);
        wrapper.addEventListener('touchstart', showControls);
        wrapper.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleFullScreen();
        });
        
        setTimeout(() => {
            if (loading) loading.classList.add('hide');
        }, 5000);
    }
    
    function showError(message) {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 4000);
    }
    
    // ============ KEYBOARD CONTROLS ============
    document.addEventListener('keydown', (e) => {
        // Space or K for play/pause
        if (e.key === ' ' || e.key === 'Space' || e.key === 'k' || e.key === 'K') {
            e.preventDefault();
            togglePlayPause();
        }
        // Left arrow for rewind
        else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            seek(-10);
        }
        // Right arrow for forward
        else if (e.key === 'ArrowRight') {
            e.preventDefault();
            seek(10);
        }
        // F for full screen
        else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            toggleFullScreen();
        }
        // Escape to exit full screen
        else if (e.key === 'Escape' && isFullScreen) {
            toggleFullScreen();
        }
        showControls();
    });
    
    // ============ INITIALIZE ============
    document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
    document.getElementById('rewindBtn').addEventListener('click', () => seek(-10));
    document.getElementById('forwardBtn').addEventListener('click', () => seek(10));
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = '/';
    });
    
    const progressBar = document.getElementById('progressBar');
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        seek(pos * 100);
    });
    
    // Start
    displayFilm();
</script>
</body>
</html>
