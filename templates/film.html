<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ film.nomi }} | Kinotop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 70px 15px 30px;
        }

        /* Video Wrapper */
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        video {
            width: 100%;
            max-height: 70vh;
            background: #000;
            cursor: pointer;
        }

        /* Custom Video Controls */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 15px 20px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .video-wrapper:hover .custom-controls {
            opacity: 1;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            position: relative;
        }

        .progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            z-index: 1;
        }

        /* Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Buttons */
        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Time Display */
        .time-display {
            color: white;
            font-size: 0.85rem;
            font-family: monospace;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Speed Select */
        .speed-select {
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Info Section */
        .info {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .info h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .film-code {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .details {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .detail {
            background: #2a2a2a;
            padding: 10px 15px;
            border-radius: 12px;
        }
        .detail-label {
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .detail-value {
            color: white;
            font-size: 0.9rem;
            margin-top: 3px;
        }
        .description {
            color: #ccc;
            line-height: 1.5;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }

        /* Loading */
        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 20;
            display: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Fullscreen */
        video:fullscreen {
            max-height: 100vh;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 60px 12px 20px; }
            .info h1 { font-size: 1.2rem; }
            .controls-left { gap: 8px; }
            .controls-right { gap: 8px; }
            .ctrl-btn { width: 30px; height: 30px; font-size: 1rem; }
            .volume-slider { width: 50px; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="/">🎬 KINOTOP</a>
    <button class="download-btn" id="downloadBtn">📥 Yuklab olish</button>
</div>

<div class="container">
    <div class="video-wrapper">
        <div class="loading-indicator" id="loadingIndicator"></div>
        <video id="videoPlayer" playsinline width="100%">
            <source src="/stream/{{ film.kod }}" type="video/mp4">
        </video>
        
        <!-- Custom Video Controls -->
        <div class="custom-controls" id="customControls">
            <!-- Progress Bar -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-buffered" id="bufferedBar"></div>
                <div class="progress-filled" id="progressFilled"></div>
            </div>
            
            <div class="controls-row">
                <div class="controls-left">
                    <!-- Play/Pause -->
                    <button class="ctrl-btn" id="playPauseBtn">
                        <i class="fas fa-play"></i>
                    </button>
                    
                    <!-- Volume -->
                    <div class="volume-container">
                        <button class="ctrl-btn" id="volumeBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
                    </div>
                    
                    <!-- Time -->
                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>
                
                <div class="controls-right">
                    <!-- Playback Speed -->
                    <select class="speed-select" id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    
                    <!-- Fullscreen -->
                    <button class="ctrl-btn" id="fullscreenBtn">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="info">
        <h1>{{ film.nomi }}</h1>
        <div class="film-code">🔑 Kod: {{ film.kod }}</div>
        
        <div class="details">
            <div class="detail">
                <div class="detail-label">Yil</div>
                <div class="detail-value">{{ film.yil if film.yil else "Noma'lum" }}</div>
            </div>
            <div class="detail">
                <div class="detail-label">Janr</div>
                <div class="detail-value">{{ film.janr if film.janr else "Noma'lum" }}</div>
            </div>
        </div>
        
        <div class="description">
            {{ film.tafsilot if film.tafsilot else "Ma'lumot yo'q" }}
        </div>
        
        <a href="/" class="back-btn">← Bosh sahifa</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script>
    const video = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const bufferedBar = document.getElementById('bufferedBar');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const speedSelect = document.getElementById('speedSelect');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const customControls = document.getElementById('customControls');

    let controlsTimeout;

    // Format time
    function formatTime(seconds) {
        if (isNaN(seconds)) return '00:00';
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) {
            return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Update progress bar
    function updateProgress() {
        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFilled.style.width = percent + '%';
            currentTimeSpan.textContent = formatTime(video.currentTime);
        }
    }

    // Update buffered bar
    function updateBuffered() {
        if (video.buffered.length > 0 && video.duration) {
            const bufferedEnd = video.buffered.end(video.buffered.length - 1);
            const percent = (bufferedEnd / video.duration) * 100;
            bufferedBar.style.width = percent + '%';
        }
    }

    // Play/Pause
    function togglePlay() {
        if (video.paused) {
            video.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            video.pause();
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    }

    playPauseBtn.addEventListener('click', togglePlay);

    video.addEventListener('play', () => {
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        loadingIndicator.style.display = 'none';
    });
    video.addEventListener('pause', () => {
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    });

    // Progress bar click
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    });

    // Time updates
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('progress', updateBuffered);

    // Duration
    video.addEventListener('loadedmetadata', () => {
        durationSpan.textContent = formatTime(video.duration);
    });

    // Volume
    volumeSlider.addEventListener('input', () => {
        video.volume = volumeSlider.value / 100;
        updateVolumeIcon();
    });

    function updateVolumeIcon() {
        if (video.volume === 0) {
            volumeBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        } else if (video.volume < 0.5) {
            volumeBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
        } else {
            volumeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        }
    }

    volumeBtn.addEventListener('click', () => {
        if (video.volume > 0) {
            video.volume = 0;
            volumeSlider.value = 0;
        } else {
            video.volume = 0.5;
            volumeSlider.value = 50;
        }
        updateVolumeIcon();
    });

    // Playback speed
    speedSelect.addEventListener('change', () => {
        video.playbackRate = parseFloat(speedSelect.value);
    });

    // Fullscreen
    fullscreenBtn.addEventListener('click', () => {
        if (video.requestFullscreen) {
            video.requestFullscreen();
        }
    });

    // Show/hide controls on mouse move
    let mouseMoveTimer;
    video.addEventListener('mousemove', () => {
        customControls.style.opacity = '1';
        clearTimeout(mouseMoveTimer);
        mouseMoveTimer = setTimeout(() => {
            if (!video.paused) {
                customControls.style.opacity = '0';
            }
        }, 2000);
    });

    video.addEventListener('mouseleave', () => {
        customControls.style.opacity = '0';
    });

    // Loading indicator
    video.addEventListener('waiting', () => {
        loadingIndicator.style.display = 'block';
    });
    video.addEventListener('canplay', () => {
        loadingIndicator.style.display = 'none';
    });
    video.addEventListener('playing', () => {
        loadingIndicator.style.display = 'none';
    });

    // Download
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.href = `/download/{{ film.kod }}`;
        link.download = '{{ film.nomi }}.mp4';
        link.click();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            togglePlay();
        }
        if (e.code === 'ArrowLeft') {
            video.currentTime -= 10;
        }
        if (e.code === 'ArrowRight') {
            video.currentTime += 10;
        }
        if (e.code === 'KeyF') {
            video.requestFullscreen();
        }
        if (e.code === 'ArrowUp') {
            video.volume = Math.min(1, video.volume + 0.1);
            volumeSlider.value = video.volume * 100;
        }
        if (e.code === 'ArrowDown') {
            video.volume = Math.max(0, video.volume - 0.1);
            volumeSlider.value = video.volume * 100;
        }
    });

    // Auto play
    video.play().catch(e => console.log('Autoplay blocked'));

    // Double click fullscreen
    video.addEventListener('dblclick', () => {
        video.requestFullscreen();
    });
</script>
</body>
</html>
