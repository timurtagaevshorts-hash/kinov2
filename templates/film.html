<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        body:fullscreen { overflow: hidden !important; }
        body:-webkit-full-screen { overflow: hidden !important; }

        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper:active .controls-overlay,
        .controls-overlay.show {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active { transform: scale(0.95); }
        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .progress-container {
            padding: 0 10px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .film-info,
        .film-info.show {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .control-btn { width: 40px; height: 40px; font-size: 1rem; }
            .play-pause-btn { width: 50px; height: 50px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="film-container">
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="videoIframe" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                allowfullscreen="true">
        </iframe>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <div class="film-info" id="filmInfo">
            <div class="film-title" id="filmTitle">Loading...</div>
            <div class="film-desc" id="filmDesc"></div>
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    // ============ FILM KODINI OLISH ============
    const filmCode = window.location.pathname.split('/').pop();
    
    // ============ TO'G'RIDAN-TO'G'RI FILM MA'LUMOTLARI ============
    // Bu qism backenddan keladi - Flask render_template da qo'shiladi
    const filmDataFromServer = {{ film | tojson | safe }};
    
    let currentIframe = null;
    let isPlaying = false;
    let controlsTimeout = null;
    let isFullScreen = false;
    let playerReady = false;
    
    // ============ FULL SCREEN ============
    function toggleFullScreen() {
        const iframe = document.getElementById('videoIframe');
        
        if (!isFullScreen) {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            isFullScreen = true;
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
            isFullScreen = false;
        }
    }
    
    document.addEventListener('fullscreenchange', () => {
        isFullScreen = !!document.fullscreenElement;
        const btn = document.getElementById('fullscreenBtn');
        if (btn) {
            btn.innerHTML = isFullScreen ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
        }
    });
    
    // ============ CONTROLS ============
    function showControls() {
        const controls = document.getElementById('controlsOverlay');
        const filmInfo = document.getElementById('filmInfo');
        controls.classList.add('show');
        filmInfo.classList.add('show');
        
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            controls.classList.remove('show');
            filmInfo.classList.remove('show');
        }, 3000);
    }
    
    function togglePlayPause() {
        if (currentIframe && currentIframe.contentWindow) {
            if (isPlaying) {
                currentIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            } else {
                currentIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            }
        }
    }
    
    function seek(seconds) {
        if (currentIframe && currentIframe.contentWindow) {
            currentIframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'seekTo',
                args: [seconds, true]
            }), '*');
        }
    }
    
    // ============ DISPLAY FILM ============
    function displayFilm() {
        const loading = document.getElementById('filmLoading');
        const iframe = document.getElementById('videoIframe');
        const title = document.getElementById('filmTitle');
        const desc = document.getElementById('filmDesc');
        
        // Film ma'lumotlarini ko'rsatish
        if (filmDataFromServer) {
            title.textContent = filmDataFromServer.sarlavha || filmDataFromServer.nomi || 'Film';
            desc.textContent = filmDataFromServer.tafsilot || filmDataFromServer.description || '';
        } else {
            title.textContent = 'Film';
            desc.textContent = '';
        }
        
        // Video URL ni tayyorlash
        let videoUrl = '';
        
        if (filmDataFromServer && filmDataFromServer.embed_url) {
            videoUrl = filmDataFromServer.embed_url;
        } else if (filmDataFromServer && filmDataFromServer.video_url) {
            videoUrl = filmDataFromServer.video_url;
        } else {
            // Test uchun - o'chirib qo'yishingiz mumkin
            showError('Video URL topilmadi!');
            loading.classList.add('hide');
            return;
        }
        
        // YouTube video bo'lsa
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
            let videoId = '';
            if (videoUrl.includes('youtu.be/')) {
                videoId = videoUrl.split('youtu.be/')[1].split('?')[0];
            } else if (videoUrl.includes('watch?v=')) {
                videoId = videoUrl.split('watch?v=')[1].split('&')[0];
            } else if (videoUrl.includes('embed/')) {
                videoId = videoUrl.split('embed/')[1].split('?')[0];
            }
            
            if (videoId) {
                videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1`;
            }
        }
        
        // Iframe ni yuklash
        iframe.src = videoUrl;
        currentIframe = iframe;
        
        iframe.onload = () => {
            setTimeout(() => {
                loading.classList.add('hide');
                isPlaying = true;
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                playerReady = true;
            }, 500);
        };
        
        iframe.onerror = () => {
            loading.classList.add('hide');
            showError('Video yuklanmadi! URL ni tekshiring');
        };
        
        // Event listenerlar
        const wrapper = document.getElementById('videoWrapper');
        wrapper.addEventListener('mousemove', showControls);
        wrapper.addEventListener('click', showControls);
        wrapper.addEventListener('touchstart', showControls);
        wrapper.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleFullScreen();
        });
        
        // 5 sekunddan keyin loading ni yashirish
        setTimeout(() => {
            loading.classList.add('hide');
        }, 5000);
    }
    
    function showError(message) {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 4000);
    }
    
    // ============ KEYBOARD CONTROLS ============
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Space':
                e.preventDefault();
                togglePlayPause();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                seek(-10);
                break;
            case 'ArrowRight':
                e.preventDefault();
                seek(10);
                break;
            case 'f':
            case 'F':
                e.preventDefault();
                toggleFullScreen();
                break;
            case 'Escape':
                if (isFullScreen) toggleFullScreen();
                break;
        }
        showControls();
    });
    
    // ============ TELEGRAM WEB FIX ============
    if (/Telegram/.test(navigator.userAgent)) {
        const style = document.createElement('style');
        style.textContent = `.control-btn { background: rgba(0,0,0,0.7) !important; }`;
        document.head.appendChild(style);
        
        setTimeout(() => {
            const instruction = document.createElement('div');
            instruction.style.cssText = 'position:fixed;bottom:100px;left:20px;right:20px;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);padding:12px;border-radius:12px;color:white;font-size:0.75rem;text-align:center;z-index:1000';
            instruction.innerHTML = '⛶ Full screen uchun ikki marta bosing yoki F tugmasini bosing';
            document.body.appendChild(instruction);
            setTimeout(() => instruction.remove(), 4000);
        }, 1000);
    }
    
    // ============ INIT ============
    document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
    document.getElementById('rewindBtn').addEventListener('click', () => seek(-10));
    document.getElementById('forwardBtn').addEventListener('click', () => seek(10));
    
    const progressBar = document.getElementById('progressBar');
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        const duration = 100;
        seek(pos * duration);
    });
    
    // Filmni ko'rsatish
    if (filmDataFromServer && filmDataFromServer.id) {
        displayFilm();
    } else {
        document.getElementById('filmLoading').classList.add('hide');
        showError('Film ma\'lumotlari topilmadi!');
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    }
</script>
</body>
</html>
