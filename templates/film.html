<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Orqaga qaytish tugmasi */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:active {
            transform: scale(0.92);
            background: rgba(102,126,234,0.8);
        }

        /* Fullscreen tugmasi - telefon uchun kattaroq */
        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .fullscreen-btn:active {
            transform: scale(0.92);
            background: rgba(102,126,234,0.8);
        }

        /* Yuklash animatsiyasi */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s;
        }

        .loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 0.9rem;
        }

        /* Xato xabari */
        .error-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            padding: 14px;
            border-radius: 12px;
            color: white;
            text-align: center;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s;
            font-size: 0.85rem;
        }

        .error-msg.show {
            transform: translateY(0);
        }

        /* Telefon uchun maxsus (iPhone va Android) */
        @supports (padding: max(0px)) {
            .back-btn {
                top: max(15px, env(safe-area-inset-top));
                left: max(15px, env(safe-area-inset-left));
            }
            .fullscreen-btn {
                bottom: max(25px, env(safe-area-inset-bottom));
                right: max(20px, env(safe-area-inset-right));
            }
        }

        /* Kichik telefonlar (iPhone SE, Galaxy) */
        @media (max-width: 380px) {
            .fullscreen-btn {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
                bottom: 20px;
                right: 15px;
            }
            .back-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                top: 12px;
                left: 12px;
            }
        }

        /* Katta telefonlar (iPhone Pro Max) */
        @media (min-width: 390px) and (max-width: 430px) {
            .fullscreen-btn {
                width: 52px;
                height: 52px;
                font-size: 1.4rem;
            }
        }

        /* iPad va planshetlar */
        @media (min-width: 768px) {
            .fullscreen-btn {
                width: 55px;
                height: 55px;
                font-size: 1.4rem;
            }
            .back-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
        }

        /* Landscape (gorizontal) holatda */
        @media (orientation: landscape) {
            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }
            .back-btn {
                top: 10px;
                left: 10px;
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="video-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="fullscreen-btn" id="fullscreenBtn">
        <i class="fas fa-expand"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        {% if film.platform == 'direct' %}
            <video id="videoPlayer" src="{{ film.video_url }}" controls autoplay playsinline webkit-playsinline style="width:100%;height:100%"></video>
        {% else %}
            <iframe id="videoPlayer" src="{{ film.video_url }}" allow="autoplay; fullscreen" allowfullscreen></iframe>
        {% endif %}
    </div>
</div>

<div class="error-msg" id="errorMsg">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    (function() {
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const backBtn = document.getElementById('backBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoWrapper = document.getElementById('videoWrapper');
        const videoPlayer = document.getElementById('videoPlayer');
        
        function showError(text) {
            errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + text;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 4000);
        }
        
        // Yuklashni yashirish
        setTimeout(() => {
            loading.classList.add('hide');
        }, 1500);
        
        // Orqaga qaytish (telefon uchun ham ishlaydi)
        backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/';
        });
        
        // Telefonda "Orqaga" gesti (swipe from left)
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchStartX < 50 && touchEndX > touchStartX + 50) {
                window.location.href = '/';
            }
        });
        
        // FULL SCREEN FUNKSIYASI (telefon uchun optimallashtirilgan)
        function toggleFullScreen() {
            const container = document.querySelector('.video-container');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                // Fullscreen ga o'tish
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (container.msRequestFullscreen) {
                    container.msRequestFullscreen();
                }
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                // Telefonda orientation lock qilish (ixtiyoriy)
                try {
                    screen.orientation?.lock('landscape');
                } catch(e) {}
            } else {
                // Fullscreen dan chiqish
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                // Orientation lockni qaytarish
                try {
                    screen.orientation?.unlock();
                } catch(e) {}
            }
        }
        
        // Fullscreen tugmasi bosilganda
        fullscreenBtn.addEventListener('click', toggleFullScreen);
        fullscreenBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            toggleFullScreen();
        });
        
        // Fullscreen o'zgarganini kuzatish
        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
        
        function updateFullscreenIcon() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }
        
        // Video player xatoliklari
        if (videoPlayer && videoPlayer.tagName === 'VIDEO') {
            videoPlayer.onerror = function() {
                showError('Video yuklanmadi. URL manzilni tekshiring.');
            };
            // Telefonda autoplay uchun
            videoPlayer.playsInline = true;
            videoPlayer.webkitPlaysInline = true;
        }
        
        // Iframe yuklanganda loading ni yashirish
        if (videoPlayer && videoPlayer.tagName === 'IFRAME') {
            videoPlayer.onload = function() {
                setTimeout(() => {
                    loading.classList.add('hide');
                }, 500);
            };
        }
        
        // Klaviatura orqali fullscreen (F tugmasi)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F' || e.key === 'F11') {
                e.preventDefault();
                toggleFullScreen();
            }
            if (e.key === 'Escape') {
                setTimeout(() => {
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }, 100);
            }
        });
        
        // Double tap fullscreen (telefon uchun)
        let lastTap = 0;
        videoWrapper.addEventListener('touchstart', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                e.preventDefault();
                toggleFullScreen();
            }
            lastTap = currentTime;
        });
    })();
</script>
</body>
</html>
