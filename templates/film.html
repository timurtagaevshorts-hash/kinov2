<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ film.nomi }} | Kinotop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: Arial, sans-serif; }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header a { color: white; text-decoration: none; font-size: 1.2rem; font-weight: bold; }
        .download-btn {
            background: #667eea;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 70px 15px 30px; }
        video { width: 100%; max-height: 70vh; background: #000; }
        
        .info {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .info h1 { color: white; font-size: 1.5rem; }
        .film-code {
            display: inline-block;
            background: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            margin: 10px 0;
        }
        .description { color: #ccc; margin-top: 15px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <a href="/">🎬 KINOTOP</a>
    <button class="download-btn" id="downloadBtn">📥 Yuklab olish</button>
</div>

<div class="container">
    <video id="videoPlayer" controls autoplay playsinline width="100%">
        <source src="/stream/{{ film.kod }}" type="video/mp4">
    </video>
    
    <div class="info">
        <h1>{{ film.nomi }}</h1>
        <div class="film-code">🔑 Kod: {{ film.kod }}</div>
        <div class="description">{{ film.tafsilot if film.tafsilot else "Ma'lumot yo'q" }}</div>
        <a href="/" class="back-btn">← Bosh sahifa</a>
    </div>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    
    // Video darhol boshlansin
    video.play().catch(e => console.log('Autoplay blocked'));
    
    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.href = `/download/{{ film.kod }}`;
        link.download = '{{ film.nomi }}.mp4';
        link.click();
    };
    
    // Keyboard shortcutlar
    document.onkeydown = (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            video.paused ? video.play() : video.pause();
        }
        if (e.code === 'ArrowLeft') video.currentTime -= 10;
        if (e.code === 'ArrowRight') video.currentTime += 10;
        if (e.code === 'KeyF') video.requestFullscreen();
    };
</script>
</body>
</html>
