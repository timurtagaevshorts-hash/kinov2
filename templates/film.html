<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ film.nomi }} | Kinotop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .controls-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active { transform: scale(0.95); }
        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .progress-container {
            padding: 0 10px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            position: relative;
        }

        .progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .film-info.show {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .film-meta {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: opacity 0.3s ease;
            opacity: 1;
        }
        
        .back-btn.hide {
            opacity: 0;
            pointer-events: none;
        }

        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 0.9rem;
        }

        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .control-btn { width: 40px; height: 40px; font-size: 1rem; }
            .play-pause-btn { width: 50px; height: 50px; font-size: 1.3rem; }
            .film-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 {{ film.nomi }} yuklanmoqda...</div>
</div>

<div class="film-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-buffered" id="progressBuffered"></div>
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <div class="film-info" id="filmInfo">
            <div class="film-title">{{ film.nomi }}</div>
            <div class="film-meta">
                {% if film.yil %}<span><i class="far fa-calendar"></i> {{ film.yil }}</span>{% endif %}
                {% if film.janr %}<span><i class="fas fa-tag"></i> {{ film.janr }}</span>{% endif %}
                {% if film.platform %}<span><i class="fas fa-play-circle"></i> {{ film.platform|upper }}</span>{% endif %}
            </div>
            {% if film.tafsilot %}
            <div class="film-desc">{{ film.tafsilot }}</div>
            {% endif %}
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    (function() {
        // Film ma'lumotlari
        const film = {{ film | tojson | safe }};
        
        // DOM elementlari
        const loading = document.getElementById('filmLoading');
        const errorMsg = document.getElementById('errorMessage');
        const backBtn = document.getElementById('backBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFilled = document.getElementById('progressFilled');
        const progressBuffered = document.getElementById('progressBuffered');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const controlsOverlay = document.getElementById('controlsOverlay');
        const filmInfo = document.getElementById('filmInfo');
        const wrapper = document.getElementById('videoWrapper');
        
        // Holat
        let currentPlayer = null;
        let currentVideo = null;
        let isPlaying = false;
        let controlsTimer = null;
        let backTimer = null;
        let progressInterval = null;
        let hls = null;
        let playerType = null;
        
        // ============ YORDAMCHI FUNKSIYALAR ============
        function showError(message) {
            errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 4000);
        }
        
        function hideLoading() {
            setTimeout(() => loading.classList.add('hide'), 500);
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds) || !seconds || seconds < 0) return '0:00';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }
        
        // ============ BOSHQARUV FUNKSIYALARI ============
        function hideControls() {
            controlsOverlay.classList.remove('show');
            filmInfo.classList.remove('show');
        }
        
        function showControls() {
            controlsOverlay.classList.add('show');
            filmInfo.classList.add('show');
            if (controlsTimer) clearTimeout(controlsTimer);
            controlsTimer = setTimeout(hideControls, 3000);
        }
        
        function showBackButton() {
            backBtn.classList.remove('hide');
            if (backTimer) clearTimeout(backTimer);
            backTimer = setTimeout(() => backBtn.classList.add('hide'), 2000);
        }
        
        function togglePlayPause() {
            if (playerType === 'video' && currentVideo) {
                if (currentVideo.paused) {
                    currentVideo.play();
                    isPlaying = true;
                    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    currentVideo.pause();
                    isPlaying = false;
                    playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                }
            }
            showControls();
        }
        
        function seek(seconds) {
            if (playerType === 'video' && currentVideo) {
                currentVideo.currentTime = Math.max(0, Math.min(currentVideo.duration, currentVideo.currentTime + seconds));
                updateProgress();
            }
            showControls();
        }
        
        function seekToPercent(percent) {
            if (playerType === 'video' && currentVideo && currentVideo.duration) {
                currentVideo.currentTime = currentVideo.duration * percent;
            }
            showControls();
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (wrapper.requestFullscreen) wrapper.requestFullscreen();
                else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
            showControls();
        }
        
        function updateProgress() {
            if (playerType === 'video' && currentVideo && currentVideo.duration) {
                const percent = (currentVideo.currentTime / currentVideo.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeSpan.textContent = formatTime(currentVideo.currentTime);
                durationSpan.textContent = formatTime(currentVideo.duration);
                
                if (currentVideo.buffered.length > 0) {
                    const buffered = (currentVideo.buffered.end(currentVideo.buffered.length - 1) / currentVideo.duration) * 100;
                    progressBuffered.style.width = buffered + '%';
                }
            }
        }
        
        // ============ VIDEO EVENTLARI ============
        function setupVideoEvents(video) {
            video.addEventListener('play', () => {
                isPlaying = true;
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });
            video.addEventListener('pause', () => {
                isPlaying = false;
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            });
            video.addEventListener('timeupdate', updateProgress);
            video.addEventListener('loadedmetadata', () => {
                durationSpan.textContent = formatTime(video.duration);
                hideLoading();
            });
            video.addEventListener('canplay', hideLoading);
            video.addEventListener('error', () => {
                showError('Video yuklashda xatolik');
                hideLoading();
            });
            video.addEventListener('waiting', () => {
                loading.classList.remove('hide');
            });
        }
        
        // ============ VIDEO YUKLASH ============
        function loadVideo() {
            const videoUrl = film.embed_url || film.direct_url;
            
            if (!videoUrl) {
                hideLoading();
                showError('Video URL topilmadi!');
                return;
            }
            
            // Tozalash
            wrapper.innerHTML = '';
            wrapper.appendChild(controlsOverlay);
            wrapper.appendChild(filmInfo);
            
            // Platforma bo'yicha yuklash
            if (film.platform === 'youtube') {
                // YouTube - iframe orqali
                playerType = 'iframe';
                const iframe = document.createElement('iframe');
                iframe.src = videoUrl;
                iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                wrapper.insertBefore(iframe, wrapper.firstChild);
                hideLoading();
                setTimeout(() => {
                    iframe.onload = hideLoading;
                }, 1000);
                
            } else if (film.platform === 'uzmedia') {
                // Uzmedia.tv - iframe orqali
                playerType = 'iframe';
                const iframe = document.createElement('iframe');
                iframe.src = videoUrl;
                iframe.allow = 'autoplay; fullscreen; encrypted-media';
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                wrapper.insertBefore(iframe, wrapper.firstChild);
                hideLoading();
                
            } else if (film.platform === 'googledrive') {
                // Google Drive
                playerType = 'iframe';
                const iframe = document.createElement('iframe');
                iframe.src = videoUrl;
                iframe.allow = 'autoplay; fullscreen';
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                wrapper.insertBefore(iframe, wrapper.firstChild);
                hideLoading();
                
            } else if (film.platform === 'direct') {
                // Direct video
                playerType = 'video';
                const video = document.createElement('video');
                video.id = 'videoPlayer';
                video.src = videoUrl;
                video.controls = false;
                video.autoplay = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'contain';
                wrapper.insertBefore(video, wrapper.firstChild);
                currentVideo = video;
                setupVideoEvents(video);
                video.load();
                
            } else {
                // Default iframe
                playerType = 'iframe';
                const iframe = document.createElement('iframe');
                iframe.src = videoUrl;
                iframe.allow = 'autoplay; fullscreen; encrypted-media';
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                wrapper.insertBefore(iframe, wrapper.firstChild);
                hideLoading();
            }
            
            // Back tugmasini avtomatik yashirish
            setTimeout(() => backBtn.classList.add('hide'), 2000);
            
            // Progress interval
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(updateProgress, 1000);
        }
        
        // ============ EVENT LISTENERLAR ============
        function setupEventListeners() {
            wrapper.addEventListener('mousemove', () => {
                showControls();
                showBackButton();
            });
            wrapper.addEventListener('click', () => {
                showControls();
                showBackButton();
            });
            wrapper.addEventListener('touchstart', () => {
                showControls();
                showBackButton();
            });
            wrapper.addEventListener('dblclick', (e) => {
                e.preventDefault();
                toggleFullscreen();
            });
            
            backBtn.addEventListener('click', () => {
                if (hls) hls.destroy();
                if (progressInterval) clearInterval(progressInterval);
                window.location.href = '/';
            });
            
            playPauseBtn.addEventListener('click', togglePlayPause);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            rewindBtn.addEventListener('click', () => seek(-10));
            forwardBtn.addEventListener('click', () => seek(10));
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                seekToPercent(pos);
            });
            
            // Klaviatura boshqaruvi
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space' || e.key === 'k' || e.key === 'K') {
                    e.preventDefault();
                    togglePlayPause();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    seek(-10);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    seek(10);
                } else if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    toggleFullscreen();
                } else if (e.key === 'Escape') {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    }
                }
                showControls();
                showBackButton();
            });
            
            // Fullscreen o'zgarishi
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            });
        }
        
        // ============ BOSHLASH ============
        setupEventListeners();
        loadVideo();
    })();
</script>
</body>
</html>
