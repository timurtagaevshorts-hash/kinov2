<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ film.nomi }} | Kinotop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s;
        }
        .loading.hide { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .film-title {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 100;
        }
        @media (max-width: 768px) {
            .back-btn, .fullscreen-btn { background: rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="video-container">
    <div class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></div>
    <div class="fullscreen-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></div>
    <div class="video-wrapper" id="videoWrapper">
        {% if film.platform == 'mp4' %}
            <video id="videoPlayer" src="{{ film.video_url }}" controls autoplay playsinline webkit-playsinline></video>
        {% else %}
            <iframe id="videoPlayer" src="{{ film.video_url }}" allow="autoplay; fullscreen" allowfullscreen></iframe>
        {% endif %}
    </div>
    <div class="film-title">{{ film.nomi }}</div>
</div>

<script>
    (function() {
        const loading = document.getElementById('loading');
        const backBtn = document.getElementById('backBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoPlayer = document.getElementById('videoPlayer');
        
        setTimeout(() => loading.classList.add('hide'), 1500);
        
        backBtn.addEventListener('click', () => window.location.href = '/');
        
        function toggleFullScreen() {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }
        
        fullscreenBtn.addEventListener('click', toggleFullScreen);
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        });
        
        // Iframe yuklanganda
        if (videoPlayer && videoPlayer.tagName === 'IFRAME') {
            videoPlayer.onload = () => setTimeout(() => loading.classList.add('hide'), 500);
        }
        
        // Video yuklanganda
        if (videoPlayer && videoPlayer.tagName === 'VIDEO') {
            videoPlayer.oncanplay = () => setTimeout(() => loading.classList.add('hide'), 500);
        }
    })();
</script>
</body>
</html>
