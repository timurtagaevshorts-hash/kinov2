<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Uzmedia.tv pleer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
        }
        .back-btn:active {
            transform: scale(0.92);
            background: rgba(102,126,234,0.8);
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s;
        }
        .loading.hide {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 0.9rem;
        }
        @supports (padding: max(0px)) {
            .back-btn {
                top: max(15px, env(safe-area-inset-top));
                left: max(15px, env(safe-area-inset-left));
            }
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="video-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    <div class="video-wrapper" id="videoWrapper">
        <!-- MUHIM: Bu yerga uzmedia.tv dan olingan to'liq embed kodini qo'ying -->
        <iframe id="videoPlayer" src="https://uzmedia.tv/embed/FILM_ID" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
</div>

<script>
    (function() {
        const loading = document.getElementById('loading');
        const backBtn = document.getElementById('backBtn');
        const iframe = document.getElementById('videoPlayer');
        
        // Yuklash animatsiyasini 1.5 sekunddan keyin yashirish
        setTimeout(() => {
            loading.classList.add('hide');
        }, 1500);
        
        // Iframe yuklanganda ham yashirish
        if (iframe) {
            iframe.onload = () => {
                loading.classList.add('hide');
            };
        }
        
        // Orqaga qaytish
        backBtn.addEventListener('click', () => {
            window.location.href = '/';
        });
        
        // Chap chetidan surish orqaga qaytish (telefon uchun)
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchStartX < 30 && touchEndX > touchStartX + 60) {
                window.location.href = '/';
            }
        });
    })();
</script>

<!-- Font Awesome ikonkalar uchun -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
